<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
</head>
<body>
    <h1>Test API</h1>
    <button onclick="testPing()">Test Ping</button>
    <button onclick="testRegistration()">Test Registration</button>
    <div id="result"></div>

    <script>
        async function testPing() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing ping...';

            try {
                const response = await fetch('/api/ping');
                const result = await response.json();
                resultDiv.innerHTML = `
                    <h3>Ping Response (Status: ${response.status}):</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<h3>Ping Error:</h3><pre>${error.message}</pre>`;
            }
        }

        async function testRegistration() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing registration...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'testuser' + Date.now(),
                        password: 'password123',
                        email: 'test' + Date.now() + '@example.com',
                        firstName: 'Test',
                        lastName: 'User'
                    })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', Object.fromEntries(response.headers));

                const result = await response.json();
                console.log('Response body:', result);

                resultDiv.innerHTML = `
                    <h3>Registration Response (Status: ${response.status}):</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('Registration error:', error);
                resultDiv.innerHTML = `<h3>Registration Error:</h3><pre>${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
