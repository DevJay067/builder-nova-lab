<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="content-language" content="en" />
    <meta name="google-translate-customization" content="translate-ready" />
    <title>
      HealthChain - Advanced Blockchain Healthcare Platform by Jay Magar
    </title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="background-color" content="#ffffff" />
    <meta name="display" content="standalone" />
    <meta name="orientation" content="portrait-primary" />

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HealthChain" />

    <!-- App Description -->
    <meta
      name="description"
      content="Revolutionary blockchain-powered healthcare platform with AI assistance, real-time IoT monitoring, 3D visualization, and secure health data management. Built by Jay Magar for international competition."
    />
    <meta
      name="keywords"
      content="healthcare, blockchain, AI, health monitoring, medical records, telemedicine, IoT, 3D visualization, Jay Magar"
    />
    <meta name="author" content="Jay Magar" />

    <!-- Open Graph Meta Tags -->
    <meta
      property="og:title"
      content="HealthChain - Advanced Healthcare Platform by Jay Magar"
    />
    <meta
      property="og:description"
      content="Revolutionary blockchain healthcare with AI assistant, real-time monitoring, and 3D visualization"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="HealthChain - Advanced Healthcare Platform"
    />
    <meta
      name="twitter:description"
      content="Revolutionary blockchain healthcare with AI assistant and real-time monitoring"
    />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />

    <!-- Preload Critical Resources -->
    <link rel="preload" href="/assets/main.css" as="style" />
    <link rel="preload" href="/assets/main.js" as="script" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/client/App.tsx"></script>
  </body>
</html>
