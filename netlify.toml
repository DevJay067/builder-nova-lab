[build]
  command = "npm run build:netlify"
  functions = "netlify/functions"
  publish = "dist/spa"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  VITE_NODE_ENV = "production"

[functions]
  external_node_modules = [
    "express", 
    "bcrypt", 
    "bcryptjs",
    "@neondatabase/serverless", 
    "serverless-http",
    "cors",
    "cookie-parser",
    "dotenv",
    "zod",
    "fs",
    "path",
    "crypto",
    "os",
    "util",
    "events",
    "stream",
    "buffer",
    "querystring",
    "child_process",
    "zlib",
    "net",
    "tls",
    "dns",
    "assert",
    "constants",
    "domain",
    "punycode",
    "string_decoder",
    "timers",
    "tty",
    "vm",
    "worker_threads"
  ]
  node_bundler = "esbuild"
  included_files = ["server/**/*", "dist/server/**/*"]
  
[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# To allow your domain to call the backend, set CORS_ORIGINS env var in your deploy
# e.g., CORS_ORIGINS = "https://www.your-domain.com,https://app.your-domain.com"
